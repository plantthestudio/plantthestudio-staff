<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --cream: #f7f6f2;
  --sage: #6a8e5a;
  --sage-dark: #4a6640;
  --sage-darker: #2d4a20;
  --sage-light: #c8dab8;
  --sage-pale: #edf4e8;
  --pink: #e8a0b0;
  --pink-deep: #c06070;
  --pink-pale: #fdf0f3;
  --pink-mid: #f0c0cc;
  --text: #1a2515;
  --text-mid: #4a5e3a;
  --text-soft: #7a8e6a;
  --border: #d0ddc0;
  --white: #ffffff;
  --warn: #7a5200;
  --warn-bg: #fffbf0;
  --r: 10px; --rs: 7px;
}
body { font-family: 'Inter', system-ui, sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

/* ── TOPBAR ── */
.topbar { background: var(--sage-darker); padding: 0 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; min-height: 54px; border-bottom: 3px solid var(--sage-dark); }
.brand { display: flex; align-items: center; gap: 10px; }
.brand-logo { width: 34px; height: 34px; object-fit: contain; }
.brand-name { font-size: 15px; font-weight: 700; color: #fff; letter-spacing: 0.01em; }
.brand-name span { color: #fff; }
.topbar-right { font-size: 11px; color: rgba(255,255,255,0.4); }

/* ── API BANNER ── */
#api-banner { background: var(--warn-bg); border-bottom: 1px solid #e8d898; padding: 8px 20px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
#api-banner label { font-size: 12px; font-weight: 600; color: var(--warn); white-space: nowrap; }
#api-key-input { flex: 1; min-width: 220px; padding: 7px 11px; border: 1px solid #d4b868; border-radius: var(--rs); font-size: 12px; background: #fff; color: var(--text); font-family: monospace; }
#api-key-input:focus { outline: 2px solid var(--sage); outline-offset: 1px; }
#api-save-btn { padding: 7px 14px; background: var(--sage-darker); color: #fff; border: none; border-radius: var(--rs); font-size: 12px; font-weight: 600; cursor: pointer; }
#api-save-btn:hover { background: var(--sage-dark); }
#api-status { font-size: 12px; color: var(--sage-dark); font-weight: 600; }

/* ── LOGIN ── */
#login-screen { position: fixed; inset: 0; z-index: 100; background: var(--cream); display: flex; align-items: center; justify-content: center; }
.login-card { background: #fff; border: 1px solid var(--border); border-radius: 16px; padding: 36px 32px 28px; width: 100%; max-width: 360px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
.login-logo { width: 80px; height: 80px; object-fit: contain; margin-bottom: 12px; }
.login-title { font-size: 20px; font-weight: 700; color: var(--sage-darker); margin-bottom: 2px; }
.login-sub { font-size: 13px; color: var(--text-soft); margin-bottom: 24px; }
.login-field { width: 100%; margin-bottom: 14px; }
.login-field label { font-size: 12px; font-weight: 600; color: var(--text-mid); display: block; margin-bottom: 6px; }
.login-field input { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--rs); font-size: 14px; font-family: 'Inter', sans-serif; background: var(--cream); color: var(--text); }
.login-field input:focus { outline: 2px solid var(--sage); outline-offset: 1px; }
.login-btn { width: 100%; margin-top: 6px; padding: 12px; background: var(--sage-darker); color: #fff; border: none; border-radius: var(--rs); font-size: 14px; font-weight: 600; cursor: pointer; }
.login-btn:hover { background: var(--sage-dark); }
#login-err { font-size: 12px; color: var(--pink-deep); margin-top: 10px; font-weight: 500; min-height: 16px; text-align: center; }
.login-deco { font-size: 11px; color: var(--text-soft); margin-top: 16px; }

/* ── LAYOUT ── */
.layout { display: flex; flex: 1; overflow: hidden; max-height: calc(100vh - 108px); }

/* ── SIDEBAR ── */
.sidebar { width: 200px; flex-shrink: 0; background: #fff; border-right: 1px solid var(--border); padding: 16px 10px; display: flex; flex-direction: column; gap: 2px; overflow-y: auto; }
.sidebar-label { font-size: 10px; font-weight: 600; color: var(--text-soft); text-transform: uppercase; letter-spacing: 0.08em; padding: 0 8px; margin-bottom: 8px; }
.cat-btn { display: flex; align-items: center; gap: 8px; padding: 9px 10px; border-radius: var(--rs); border: none; background: transparent; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text-mid); width: 100%; text-align: left; font-family: 'Inter', sans-serif; transition: all 0.12s; }
.cat-btn:hover { background: var(--sage-pale); color: var(--sage-darker); }
.cat-btn.active { background: var(--sage-pale); color: var(--sage-darker); font-weight: 600; }
.sidebar-divider { margin: 8px 8px 6px; border: none; border-top: 1px solid var(--border); }

/* ── CHAT ── */
.chat-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.chat-header { padding: 12px 18px; border-bottom: 1px solid var(--border); background: #fff; display: flex; align-items: center; justify-content: space-between; }
.chat-header-left { display: flex; align-items: center; gap: 10px; }
.hbadge { padding: 3px 10px; background: var(--pink-pale); border: 1px solid var(--pink-mid); border-radius: 20px; font-size: 11px; font-weight: 600; color: var(--pink-deep); }
.htitle { font-size: 14px; font-weight: 600; color: var(--text); }
.huser { display: flex; align-items: center; gap: 6px; background: var(--sage-pale); border: 1px solid var(--sage-light); border-radius: 20px; padding: 4px 10px 4px 6px; }
.hav { width: 22px; height: 22px; border-radius: 50%; background: var(--sage); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #fff; }
.hname { font-size: 12px; color: var(--sage-darker); font-weight: 600; }
.hlout { font-size: 11px; color: var(--text-soft); cursor: pointer; margin-left: 8px; background: none; border: none; font-family: 'Inter', sans-serif; }
.hlout:hover { color: var(--pink-deep); }

.messages { flex: 1; overflow-y: auto; padding: 18px; display: flex; flex-direction: column; gap: 14px; background: var(--cream); }
.msg { display: flex; gap: 10px; }
.msg.staff { flex-direction: row-reverse; }
.avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; margin-top: 2px; border: 1px solid var(--border); background: #fff; }
.avatar.ai { border-color: var(--sage-light); background: var(--sage-pale); }
.avatar.staff { border-color: var(--pink-mid); background: var(--pink-pale); }
.bubble { max-width: 88%; padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.7; }
.bubble.ai { background: #fff; border: 1px solid var(--border); border-bottom-left-radius: 3px; color: var(--text); }
.bubble.staff { background: var(--pink-pale); border: 1px solid var(--pink-mid); border-bottom-right-radius: 3px; color: var(--pink-deep); }

/* ── RESPONSE FORMATTING ── */
.tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-right: 6px; vertical-align: middle; }
.tag.urgent { background: #fde8ee; color: #c04060; border: 1px solid #f0c0cc; }
.tag.care { background: #fff8e0; color: #7a5200; border: 1px solid #e8d898; }
.tag.routine { background: var(--sage-pale); color: var(--sage-darker); border: 1px solid var(--sage-light); }
.sec-label { font-size: 10px; font-weight: 700; color: var(--text-soft); text-transform: uppercase; letter-spacing: 0.07em; margin: 12px 0 6px; display: block; }
.step { display: flex; gap: 8px; margin: 4px 0; align-items: flex-start; }
.snum { width: 20px; height: 20px; border-radius: 50%; background: var(--sage-pale); border: 1px solid var(--sage-light); color: var(--sage-darker); font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; }
.stext { font-size: 13px; line-height: 1.6; }
.script { margin: 8px 0; padding: 10px 12px; border-left: 3px solid var(--sage); background: var(--sage-pale); border-radius: 0 8px 8px 0; font-size: 13px; color: var(--sage-darker); font-style: italic; line-height: 1.6; cursor: pointer; }
.script::before { content: '💬 '; font-style: normal; }
.flag { margin: 5px 0; padding: 8px 12px; border-left: 3px solid var(--pink); background: var(--pink-pale); border-radius: 0 8px 8px 0; font-size: 12px; color: var(--pink-deep); line-height: 1.55; }
.mgr { display: inline-block; padding: 1px 6px; border-radius: 3px; background: var(--pink-pale); border: 1px solid var(--pink); color: var(--pink-deep); font-size: 11px; font-weight: 600; margin-right: 5px; }

/* ── INTAKE FORM ── */
.form-group { margin-bottom: 16px; }
.form-group > label { font-size: 13px; font-weight: 600; color: var(--text); display: block; margin-bottom: 8px; }
.radio-group { display: flex; flex-direction: column; gap: 6px; }
.radio-group label { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 400; color: var(--text); display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 7px 10px; border-radius: 8px; border: 1px solid var(--border); background: #fff; transition: all 0.12s; }
.radio-group label:hover { background: var(--sage-pale); border-color: var(--sage-light); }
.radio-group input[type=radio] { accent-color: var(--sage-darker); width: 15px; height: 15px; flex-shrink: 0; }
.get-answer-btn { width: 100%; margin-top: 14px; padding: 12px; background: var(--sage-darker); color: #fff; border: none; border-radius: var(--rs); font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; }
.get-answer-btn:hover { background: var(--sage-dark); }

/* ── PILLS ── */
.pills { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.pill { padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border); background: #fff; font-size: 12px; font-weight: 500; color: var(--text-mid); cursor: pointer; transition: all 0.12s; }
.pill:hover { background: var(--sage-pale); border-color: var(--sage-light); color: var(--sage-darker); }

/* ── THINKING ── */
.thinking { display: flex; gap: 5px; align-items: center; padding: 4px 0; }
.dot { width: 6px; height: 6px; border-radius: 50%; animation: pulse 1.2s ease-in-out infinite; }
.dot:nth-child(1) { background: var(--sage); }
.dot:nth-child(2) { background: var(--pink); animation-delay: 0.2s; }
.dot:nth-child(3) { background: var(--sage); animation-delay: 0.4s; }
@keyframes pulse { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

/* ── INPUT BAR ── */
.input-bar { padding: 12px 18px; border-top: 1px solid var(--border); background: #fff; display: flex; gap: 8px; align-items: flex-end; }
.input-bar textarea { flex: 1; resize: none; padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--r); font-size: 13px; font-family: 'Inter', sans-serif; color: var(--text); background: var(--cream); line-height: 1.5; max-height: 110px; overflow-y: auto; }
.input-bar textarea:focus { outline: none; border-color: var(--sage); }
.input-bar textarea::placeholder { color: var(--text-soft); }
.send-btn { padding: 9px 16px; background: var(--sage-darker); color: #fff; border: none; border-radius: var(--r); font-size: 13px; font-weight: 600; cursor: pointer; height: 40px; white-space: nowrap; font-family: 'Inter', sans-serif; }
.send-btn:hover { background: var(--sage-dark); }
.send-btn:disabled { background: var(--border); cursor: not-allowed; }

/* ── SPARKLES ── */
.sparkle { position: fixed; pointer-events: none; animation: floatup 1.4s ease-out forwards; z-index: 999; font-size: 13px; }
@keyframes floatup { 0%{opacity:1;transform:translateY(0)} 100%{opacity:0;transform:translateY(-60px)} }

/* ── MOBILE ── */
@media(max-width:768px) {
  .sidebar { display: none; }
  .topbar-right { display: none; }
  .layout { max-height: calc(100vh - 90px); }
  .bubble { max-width: 96% !important; }
  .huser { display: none; }
  .mobile-cats { display: flex !important; }
}
.mobile-cats { display: none; overflow-x: auto; gap: 6px; padding: 8px 14px; background: #fff; border-bottom: 1px solid var(--border); flex-shrink: 0; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.mobile-cats::-webkit-scrollbar { display: none; }
.mobile-cat-btn { flex-shrink: 0; padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--cream); font-size: 12px; font-weight: 500; color: var(--text-mid); font-family: 'Inter', sans-serif; cursor: pointer; white-space: nowrap; }
.mobile-cat-btn.active { background: var(--sage-pale); border-color: var(--sage); color: var(--sage-darker); font-weight: 600; }
</style>

const SYSTEM = `You are a customer service assistant for PlantTheStudio, a tissue culture plant shop in Brooklyn NY. Staff will submit a form with all details filled in. Based on those details, give ONE complete, decisive response — no follow-up questions. Tell staff exactly what to do AND give the exact copy-paste message to send the customer.

POLICIES:
- Store credit instead of refund for under $20 (except missing plant with carrier claim approved)
- Under $20 damaged/wrong variety: store credit
- Over $20 under $50: staff handles per decision tree below
- Over $50 OR chargeback threat OR first-time buyer not received OR plant died days later: ESCALATE TO MANAGER
- Store credit: no coupon code or promo code needed. Note the credit amount (plant value only, NOT including shipping) in the conversation. When customer places next order, they message us, we check conversation history to confirm, then refund that amount manually.
- NEVER promise refund without manager approval
- Shipping fees never refundable
- 15% restocking fee on all cancellations/switches (calculated on full order total INCLUDING shipping) — calculated on FULL order total INCLUDING shipping

DAMAGED / DOA RULES:
- Must report within 12 hours of delivery
- Need unboxing video + photo
- If transit over 3 days: file Pirate Ship claim, carrier delay case
- If completely dead + within 12hrs + evidence: under $20 = store credit, over $20 = reship if in stock, else delist listing, else store credit
- If completely dead + outside 12hrs but contacted same/next day (good faith): treat kindly, offer store credit under $20, reship over $20 if possible
- If completely dead + contacted days later: send care instructions first, if no recovery = manager decides goodwill
- If partially damaged/stressed: send care instructions link https://www.plantthestudio.com/blogs/lets-talk-about-plants
- Pirate Ship claim: under $20 = store credit while waiting; over $20 returning = file claim + reship 7-10 days; over $20 first-time = file claim + manager approves reship

MISSING PLANT RULES:
- Check warehouse inventory first
- Ask customer to check all packing materials (bubble wrap, thermal wrap, bottom of box)
- Need unboxing video if not in stock
- Stock priority order: 1) Exact plant from warehouse 2) Replacement from growing trays 3) LAST RESORT: delist from current website/Palmstreet listing (staff must delist it immediately after)
- If using a listed plant to reship: tell staff to delist it from website AND Palmstreet before shipping
- Under $20: store credit (not worth reshipping given $15 shipping cost)
- Over $20: follow stock priority above, if nothing available → store credit
- Over $50: manager
- Always include plant value in response when provided
- When plant value is provided, use it in the response to calculate store credit or refund amounts

WRONG VARIETY RULES (completely different plant):
- Under $20: store credit
- Over $20: reship correct plant → if no exact match offer replacement → if no replacement offer store credit → if customer refuses store credit → manager (may need return if over $20)

WRONG EXACT PLANT RULES (same variety, unhappy with variegation/size):
- Only if customer actively complaining
- Explain variegation varies naturally
- If still unhappy: offer 20% goodwill discount
- If refuses 20%: manager

REFUND/CANCEL RULES:
- Not shipped: 15% restocking fee calculated on FULL order total INCLUDING shipping. Confirm exact amount with customer before processing.
- Already shipped: all sales final, no refund unless DOA or wrong item
- Chargeback threat: manager immediately

PICKUP RULES:
- Under 7 days: remind customer to pick up
- Over 7 days + still available: offer holding fee listing
- Over 7 days + not available: inform order is gone

WEATHER DAMAGE RULES:

ACCLIMATION SOP:
Format answers as clear numbered steps — easy to follow one by one.

Tray rules:
• Max 2 varieties per tray
• Never put same species together (e.g. no two Alocasia varieties in one tray — use two different species instead)
• If more than 2 varieties: label EVERY single plug
• Prioritize multipacks — reserve single bags for customer sales

Step-by-step:
1. Fill 2 containers with warm water — one for plugs to soak, one for TC plants
2. Switch TC water between species and after any contaminated/rotted bags
3. Cut plugs vertically on one side to make room for the plant (can do before or after soaking)
4. Gently massage agar off the plant with warm water — be thorough, leftover agar causes mold
5. Remove all rotted (soft/mushy/discolored) roots and leaves — can remove everything if needed
6. Alocasia roots: trim especially short — they are more susceptible to rot
7. Place plantlet into plug, then place plug into tray
8. Take completed trays to the sink — water them, then remove excess moisture
9. Seal trays with tape
10. Label each tray: plant name + acclimation date + handler initials
11. Upload to TC Acclimation spreadsheet: plant name, quantity, date

Timeline:
• Plants acclimate for approximately 4 weeks before being sold
• Check trays every week to ensure proper growing conditions

    return;

  currentUser = user;
  document.getElementById('login-screen').style.display = 'none';
  const name = user.charAt(0).toUpperCase() + user.slice(1);
  document.getElementById('hav').textContent = name.charAt(0).toUpperCase();
  document.getElementById('hname').textContent = name;
  if (apiKey) {
    document.getElementById('api-key-input').value = apiKey;
    document.getElementById('api-status').textContent = '✓ Key ready!';
  }
  // Show intake form after login
  setTimeout(function() { showIntakeForm('damaged'); }, 100);
}

function doLogout() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-user').value = '';
  document.getElementById('login-pass').value = '';
  document.getElementById('login-err').textContent = '';
  history = [];
}

/* ── API KEY ── */
function saveKey() {
  const val = document.getElementById('api-key-input').value.trim();
  if (!val.startsWith('sk-ant-')) {
    document.getElementById('api-status').textContent = '⚠ Should start with sk-ant-';
    return;
  }
  apiKey = val;
  localStorage.setItem('pts_api_key', val);
  document.getElementById('api-status').textContent = '✓ Saved! ♥';
  spawnSparkles(document.getElementById('api-save-btn'));
}

function submitIntakeForm() {
  // Collect all form values
  const form = document.getElementById('intake-form');
  const data = { category: currentCat };

  // Plant value input
  const plantValueInput = document.getElementById('plant-value');
  if (plantValueInput && plantValueInput.value) data.plantValue = '$' + plantValueInput.value;

  // Radio buttons
  form.querySelectorAll('input[type=radio]:checked').forEach(r => {
    data[r.name] = r.value;
  });

  // Text inputs
  const orderTotal = document.getElementById('order-total');
  if (orderTotal) data.orderTotal = orderTotal.value;
  const damageDesc = document.getElementById('damage-desc');
  if (damageDesc) data.damageDesc = damageDesc.value;
  const otherDesc = document.getElementById('other-desc');
  if (otherDesc) data.otherDesc = otherDesc.value;

  const summary = buildFormSummary(data);
  sendFormMsg(summary, data);
}

function buildFormSummary(data) {
  const parts = ['Issue category: ' + data.category];
  Object.entries(data).forEach(([k, v]) => {
    if (k !== 'category' && v) parts.push(k + ': ' + v);
  });
  return parts.join(', ');
}

function usePill(text) {
  const ta = document.getElementById('user-input');
  ta.value = text;
  autoResize(ta);
  setTimeout(sendMsg, 150);
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 110) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
}

const SPARKS = ['✦','♥','🌿','🌸','✨','💚','🩷','✦'];
function spawnSparkles(el) {
  const rect = el.getBoundingClientRect();
  SPARKS.forEach((s, i) => {
    setTimeout(() => {
      const sp = document.createElement('div');
      sp.className = 'sparkle';
      sp.textContent = s;
      sp.style.left = (rect.left + Math.random() * Math.max(rect.width, 50)) + 'px';
      sp.style.top = (rect.top + Math.random() * 10) + 'px';
      document.body.appendChild(sp);
      setTimeout(() => sp.remove(), 1500);
    }, i * 75);
  });
}

function addMsg(role, content, isHTML) {
  const wrap = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = `msg ${role === 'user' ? 'staff' : ''}`;
  const av = document.createElement('div');
  av.className = `avatar ${role === 'user' ? 'staff' : 'ai'}`;
  av.textContent = role === 'user' ? '👤' : '🌿';
  const b = document.createElement('div');
  b.className = `bubble ${role === 'user' ? 'staff' : 'ai'}`;
  if (isHTML) b.innerHTML = content; else b.textContent = content;
  d.appendChild(av); d.appendChild(b);
  wrap.appendChild(d);
  wrap.scrollTop = wrap.scrollHeight;
  return b;
}

function fmt(text) {
  var data;
  try {
    var clean = text.replace(/```json|```/g, '').trim();
    data = JSON.parse(clean);
  } catch(err) {
    return '<p style="white-space:pre-wrap;font-size:13px;">' + text.replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</p>';
  }

  var sevCls = data.severity === 'URGENT' ? 'urgent' : data.severity === 'NEEDS CARE' ? 'care' : 'routine';
  var out = '';

  // Severity + summary
  if (data.severity) {
    out += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;"><span class="tag ' + sevCls + '">' + e(data.severity) + '</span><strong style="font-size:13px;">' + e(data.summary || '') + '</strong></div>';
  }

  // Action (for customer issues)
  if (data.action && data.action !== 'Reference the steps below.') {
    out += '<div class="sec-label">📋 do this now</div>';
    out += '<div style="font-size:13px;line-height:1.7;margin-bottom:12px;padding:8px 0;">' + e(data.action) + '</div>';
  }

  // SOP Steps - clean numbered list
  if (data.sop_steps && data.sop_steps.length) {
    out += '<div class="sec-label">📋 steps</div>';
    data.sop_steps.forEach(function(s, i) {
      out += '<div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:8px;">';
      out += '<div style="width:22px;height:22px;border-radius:50%;background:#edf4e8;border:0.5px solid #c8dab8;color:#2d4a20;font-size:11px;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;">' + (i+1) + '</div>';
      out += '<div style="font-size:13px;line-height:1.6;padding-top:2px;">' + e(s) + '</div>';
      out += '</div>';
    });
  }

  // SOP Notes - subtle grey boxes
  if (data.sop_notes && data.sop_notes.length) {
    out += '<div class="sec-label" style="margin-top:12px;">📌 important rules</div>';
    data.sop_notes.forEach(function(n) {
      // Check if it looks like a customer message template
      if (n.indexOf('Hi ') === 0 || n.indexOf('"') === 0 || n.toLowerCase().indexOf('template:') > -1) {
        out += '<div style="margin:6px 0;padding:10px 12px;border-left:3px solid #6a8e5a;background:#edf4e8;border-radius:0 8px 8px 0;font-size:12.5px;color:#2d4a20;font-style:italic;line-height:1.65;" onclick="navigator.clipboard && navigator.clipboard.writeText(this.innerText)">💬 ' + e(n) + '</div>';
      } else {
        out += '<div style="margin:5px 0;padding:8px 12px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);font-size:13px;color:var(--color-text-primary);line-height:1.5;border-left:3px solid #c8dab8;">' + e(n) + '</div>';
      }
    });
  }

  // Customer message
  if (data.customer_message) {
    out += '<div class="sec-label" style="margin-top:12px;">💬 send this to customer</div>';
    out += '<div class="script" onclick="navigator.clipboard && navigator.clipboard.writeText(this.innerText.replace('💬 ',''))" style="cursor:pointer;" title="Click to copy">' + e(data.customer_message) + '<br><small style="opacity:0.5;font-style:normal;font-size:10px;">tap to copy</small></div>';
  }

  // Next question
  if (data.question) {
    out += '<div class="sec-label" style="margin-top:12px;">❓ next</div>';
    out += '<div style="background:var(--color-background-secondary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:10px 12px;font-size:13px;font-weight:500;color:var(--color-text-primary);">' + e(data.question) + '</div>';
  }

  // Flags (manager escalations only)
  if (data.flags && data.flags.length) {
    out += '<div class="sec-label" style="margin-top:12px;">⚠️ manager</div>';
    data.flags.forEach(function(f) {
      out += '<div style="margin:5px 0;padding:8px 12px;background:var(--color-background-warning);border-left:3px solid var(--color-border-warning);border-radius:0 8px 8px 0;font-size:12.5px;color:var(--color-text-warning);line-height:1.55;">';
      if (/manager|approval|check with/i.test(f)) {
        out += '<span style="display:inline-block;padding:1px 6px;border-radius:3px;background:var(--color-background-danger);color:var(--color-text-danger);font-size:11px;font-weight:600;margin-right:6px;">↑ MGR</span>';
      } else {
        out += '⚠ ';
      }
      out += e(f) + '</div>';
    });
  }

  // SOP Images (screenshots)
  if (data.sop_images && data.sop_images.length) {
    data.sop_images.forEach(function(img) {
      if (img === 'PALMSTREET_SCREENSHOT' && typeof PALMSTREET_SCREENSHOT !== 'undefined') {
        out += '<div style="margin-top:14px;">';
        out += '<div class="sec-label">📱 how it looks in the app</div>';
        out += '<img src="' + PALMSTREET_SCREENSHOT + '" style="max-width:100%;border-radius:8px;border:0.5px solid var(--color-border-tertiary);margin-top:6px;" alt="Palmstreet auction screenshot"/>';
        out += '<div style="font-size:11px;color:var(--color-text-tertiary);margin-top:6px;">Tap the + icon on your live page → Select Auction → Fill in the form as shown</div>';
        out += '</div>';
      }
    });
  }

  return out;
}
function e(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function copyMsg(el) {
  const text = el.innerText.replace('click to copy','').trim();
  navigator.clipboard.writeText(text).then(function() {
    el.style.background = 'var(--sage-light)';
    setTimeout(function(){ el.style.background = ''; }, 1000);
  });
}

// ── WEATHER CHECK ──
async function checkWeather(zip) {
  try {
    // Use open-meteo geocoding + weather API (free, no key needed)
    const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${zip}&count=1&language=en&format=json`);
    const geoData = await geoRes.json();
    if (!geoData.results || !geoData.results.length) return null;
    const { latitude, longitude, name, admin1 } = geoData.results[0];
    // Get past 7 days max/min temps
    const today = new Date().toISOString().split('T')[0];
    const weekAgo = new Date(Date.now() - 7*24*60*60*1000).toISOString().split('T')[0];
    const wxRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&daily=temperature_2m_max,temperature_2m_min&temperature_unit=fahrenheit&start_date=${weekAgo}&end_date=${today}&timezone=auto`);
    const wxData = await wxRes.json();
    const maxTemp = Math.max(...wxData.daily.temperature_2m_max);
    const minTemp = Math.min(...wxData.daily.temperature_2m_min);
    return { name, state: admin1, maxTemp: Math.round(maxTemp), minTemp: Math.round(minTemp) };
  } catch(e) { return null; }
}

async function runWeatherCheck() {
  const zip = document.getElementById('weather-zip').value.trim();
  if (!zip) return;
  const btn = document.getElementById('weather-btn');
  btn.textContent = 'Checking...';
  btn.disabled = true;

  // Check both Brooklyn (origin) and customer destination
  const [dest, origin] = await Promise.all([
    checkWeather(zip),
    checkWeather('11201') // Brooklyn NY
  ]);

  btn.textContent = 'Check Weather';
  btn.disabled = false;

  if (!dest || !origin) {
    addMsg('assistant', '<div class="flag">⚠ Could not fetch weather data. Please check manually at weather.com</div>', true);
    return;
  }

  const destExtreme = dest.maxTemp > 100 || dest.minTemp < 45;
  const originExtreme = origin.maxTemp > 100 || origin.minTemp < 45;
  const isExtreme = destExtreme || originExtreme;

  let weatherMsg = `<div class="sec-label">🌡️ weather check results (past 7 days)</div>`;
  weatherMsg += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:6px 0;">`;
  weatherMsg += `<div style="padding:10px;background:${originExtreme?'var(--pink-pale)':'var(--sage-pale)'};border:2px solid ${originExtreme?'var(--pink)':'var(--sage-light)'};border-radius:8px;font-size:12px;">
    <strong>📍 Origin (Brooklyn)</strong><br>
    High: <strong>${origin.maxTemp}°F</strong><br>
    Low: <strong>${origin.minTemp}°F</strong><br>
    ${originExtreme ? '<span style="color:var(--pink-deep);font-weight:700;">⚠ EXTREME TEMP</span>' : '<span style="color:var(--sage-darker);">✓ Normal range</span>'}
  </div>`;
  weatherMsg += `<div style="padding:10px;background:${destExtreme?'var(--pink-pale)':'var(--sage-pale)'};border:2px solid ${destExtreme?'var(--pink)':'var(--sage-light)'};border-radius:8px;font-size:12px;">
    <strong>📦 Destination (${dest.name}, ${dest.state})</strong><br>
    High: <strong>${dest.maxTemp}°F</strong><br>
    Low: <strong>${dest.minTemp}°F</strong><br>
    ${destExtreme ? '<span style="color:var(--pink-deep);font-weight:700;">⚠ EXTREME TEMP</span>' : '<span style="color:var(--sage-darker);">✓ Normal range</span>'}
  </div>`;
  weatherMsg += '</div>';

  if (isExtreme) {
    weatherMsg += `<div class="flag"><span class="mgr">WEATHER DAMAGE</span> Extreme temperatures detected. This may not be covered under policy if customer did not add heat pack/thermal wrap.</div>`;
    weatherMsg += `<div class="sec-label">📋 confirm with staff</div>`;
    weatherMsg += `<div style="display:flex;flex-direction:column;gap:6px;margin:4px 0;">
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;"><input type="checkbox" id="wc1"> Customer did NOT add weather protection (heat pack or thermal wrap) at checkout</label>
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;"><input type="checkbox" id="wc2"> Damage appears heat/cold related (wilting, rot, freeze damage)</label>
    </div>`;
    weatherMsg += `<button onclick="confirmWeatherDamage()" style="margin-top:8px;padding:7px 14px;background:var(--sage-darker);color:#fff;border:none;border-radius:8px;border-bottom:3px solid #1a2e10;font-family:'Press Start 2P',monospace;font-size:7px;cursor:pointer;line-height:2;">CONFIRM & GET RESPONSE ▶</button>`;
  } else {
    weatherMsg += `<div style="background:var(--sage-pale);border:2px solid var(--sage-light);border-radius:8px;padding:10px;font-size:13px;color:var(--sage-darker);font-weight:700;">✓ Temperatures were normal. This is not weather damage — treating as regular damage claim.</div>`;
    weatherMsg += `<button onclick="startDOAFlow()" style="margin-top:8px;padding:7px 14px;background:var(--sage-darker);color:#fff;border:none;border-radius:8px;border-bottom:3px solid #1a2e10;font-family:'Press Start 2P',monospace;font-size:7px;cursor:pointer;line-height:2;">CONTINUE TO DAMAGE FLOW ▶</button>`;
  }

  addMsg('assistant', weatherMsg, true);
}

function confirmWeatherDamage() {
  const c1 = document.getElementById('wc1')?.checked;
  const c2 = document.getElementById('wc2')?.checked;
  if (c1 && c2) {
    const msg = fmt(JSON.stringify({
      severity: 'NEEDS CARE',
      summary: 'Weather damage confirmed — not covered under policy',
      action: 'Inform customer that weather damage is not covered per our policy.',
      question: '',
      customer_message: "Hi! We're sorry about your plant! Unfortunately weather-related damage is not covered under our policy, as we recommend adding a heat pack or thermal wrap for extreme temperatures at checkout. We hope your plant recovers!",
      flags: ['Weather damage is customer responsibility if heat pack was not purchased']
    }));
    addMsg('assistant', msg, true);
  } else {
    addMsg('assistant', '<div class="flag">⚠ Please check both boxes to confirm weather damage before proceeding.</div>', true);
  }
}

function startDOAFlow() {
  const ta = document.getElementById('user-input');

}
